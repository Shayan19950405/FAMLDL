# Auto-generated by Step 5 Cell B
seed_everything: 42

trainer:
  max_epochs: 20
  precision: 16-mixed
  devices: 1
  gradient_clip_val: 0.01
  gradient_clip_algorithm: norm
  logger:
    class_path: lightning.pytorch.loggers.CSVLogger
    init_args:
      save_dir: /content/drive/MyDrive/FAMLDL/checkpoints/logs
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: /content/drive/MyDrive/FAMLDL/checkpoints
        filename: "exp_5_2_partial-{epoch:02d}-{metrics/val_iou_all:.4f}"
        save_top_k: 1
        monitor: "metrics/val_iou_all"
        mode: "max"
        save_last: false

model:
  class_path: training.mask_classification_semantic.MaskClassificationSemantic
  init_args:
    attn_mask_annealing_enabled: true
    attn_mask_annealing_start_steps: [2972, 7429, 11888]
    attn_mask_annealing_end_steps: [5944, 10401, 14860]
    ckpt_path: /content/checkpoints/eomt_coco.bin
    load_ckpt_class_head: false      # ← 133-class head reinitialized to 19 classes
    network:
      class_path: models.eomt.EoMT
      init_args:
        num_q: 100                   # ← Cityscapes uses 100 queries (not 200)
        num_blocks: 3
        encoder:
          class_path: models.vit.ViT
          init_args:
            backbone_name: vit_base_patch14_reg4_dinov2

data:
  class_path: datasets.cityscapes_semantic.CityscapesSemantic
  init_args:
    path: /content/drive/MyDrive/FAMLDL
    batch_size: 4
    num_workers: 4
